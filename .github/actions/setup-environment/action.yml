name: 'Setup Build Environment'
description: 'Setup Node.js, Rust, Java, and Android SDK/NDK with caching'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  rust-targets:
    description: 'Additional Rust targets to install (comma-separated)'
    required: false
    default: ''
  java-version:
    description: 'Java version to use'
    required: false
    default: '17'
  ndk-version:
    description: 'Android NDK version to use'
    required: false
    default: 'r26b'

outputs:
  ndk-path:
    description: 'Path to Android NDK'
    value: ${{ steps.setup-ndk.outputs.ndk-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ inputs.rust-targets }}

    - name: Cache Rust dependencies
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/bin/
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java-version }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      shell: bash

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: ${{ inputs.ndk-version }}
        add-to-path: true
