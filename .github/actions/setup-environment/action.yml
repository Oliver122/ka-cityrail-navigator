name: 'Setup Build Environment'
description: 'Setup Node.js, Rust, Java, and Android SDK/NDK with caching'

inputs:
  node-version:
    description: 'Node.js version to use'
    required: false
    default: '20'
  rust-targets:
    description: 'Additional Rust targets to install (comma-separated)'
    required: false
    default: ''
  rust-toolchain:
    description: 'Rust toolchain channel/version'
    required: false
    default: 'stable'
  rust-components:
    description: 'Rust components to install (comma-separated)'
    required: false
    default: 'clippy,rustfmt'
  java-version:
    description: 'Java version to use'
    required: false
    default: '17'
  ndk-version:
    description: 'Android NDK version to use'
    required: false
    default: 'r26b'

outputs:
  ndk-path:
    description: 'Path to Android NDK'
    value: ${{ steps.setup-ndk.outputs.ndk-path }}

runs:
  using: 'composite'
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'

    - name: Install Linux system dependencies
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          pkg-config \
          libgtk-3-dev \
          libwebkit2gtk-4.1-dev \
          libsoup-3.0-dev \
          libjavascriptcoregtk-4.1-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9
      with:
        toolchain: ${{ inputs.rust-toolchain }}
        targets: ${{ inputs.rust-targets }}
        components: ${{ inputs.rust-components }}

    - name: Cache Rust dependencies
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/src/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          src-tauri/target/
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    - name: Setup Java
      uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
      with:
        distribution: 'temurin'
        java-version: ${{ inputs.java-version }}

    - name: Setup Android SDK
      uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407

    - name: Setup Android NDK
      uses: nttld/setup-ndk@ed92fe6cadad69be94a966a7ee3271275e62f779
      id: setup-ndk
      with:
        ndk-version: ${{ inputs.ndk-version }}
        add-to-path: true

    - name: Install npm dependencies
      shell: bash
      run: npm ci
