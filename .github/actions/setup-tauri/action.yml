name: 'Setup Tauri CLI'
description: 'Install Tauri CLI using npm (fast) with proper caching'

runs:
  using: 'composite'
  steps:
    - name: Install frontend dependencies (includes Tauri CLI)
      shell: bash
      run: npm ci

    - name: Verify Tauri CLI installation
      shell: bash
      run: npm run tauri -- --version
