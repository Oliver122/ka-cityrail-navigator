name: PR Validation

on:
  pull_request:
    branches: [development, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Android runtime smoke tests
        run: npm run test:android-smoke

      - name: Frontend unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

  android-validation:
    runs-on: ubuntu-latest
    needs: quality
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android'

      - name: Install dependencies
        run: npm ci

      - name: Initialize Android
        run: npx tauri android init

      - name: Validate generated Android permissions
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          CAPABILITIES="src-tauri/capabilities/default.json"
          test -f "$MANIFEST"
          if grep -Eq "android.permission.ACCESS_(COARSE|FINE)_LOCATION" "$MANIFEST"; then
            echo "Location permission present in generated manifest."
          elif grep -Eq "geolocation:allow-(request-permissions|get-current-position)" "$CAPABILITIES"; then
            echo "Manifest permission not found at init stage; geolocation capability is configured."
          else
            echo "Missing Android location permission and geolocation capability configuration."
            exit 1
          fi

      - name: Build APK (validation)
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

