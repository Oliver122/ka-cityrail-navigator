name: PR Validation

on:
  pull_request:
    branches: [development, main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

concurrency:
  group: pr-validation-${{ github.event.pull_request.number }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android'

      - name: Build frontend
        run: npm run build

      - name: Rust formatting check
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all -- --check

      - name: Rust lint check
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings

      - name: Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features

      - name: Initialize Android project
        run: npx tauri android init

      - name: Build Android APK (quick validation - aarch64 only)
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}
