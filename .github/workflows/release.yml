name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.parse.outputs.version }}
      tag: ${{ steps.parse.outputs.tag }}

    steps:
      - name: Parse version from tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Release: $TAG (version $VERSION)"

      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Verify version files match tag
        run: |
          VERSION="${{ steps.parse.outputs.version }}"

          PKG_VERSION=$(node -p "require('./package.json').version")
          TAURI_VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")
          CARGO_VERSION=$(grep -m1 '^version' src-tauri/Cargo.toml | sed 's/.*"\(.*\)".*/\1/')

          echo "Tag version:   $VERSION"
          echo "package.json:  $PKG_VERSION"
          echo "tauri.conf:    $TAURI_VERSION"
          echo "Cargo.toml:    $CARGO_VERSION"

          MISMATCH=0
          [ "$PKG_VERSION" != "$VERSION" ] && echo "::error::package.json ($PKG_VERSION) != tag ($VERSION)" && MISMATCH=1
          [ "$TAURI_VERSION" != "$VERSION" ] && echo "::error::tauri.conf.json ($TAURI_VERSION) != tag ($VERSION)" && MISMATCH=1
          [ "$CARGO_VERSION" != "$VERSION" ] && echo "::error::Cargo.toml ($CARGO_VERSION) != tag ($VERSION)" && MISMATCH=1

          if [ "$MISMATCH" -eq 1 ]; then
            echo "::error::Version mismatch! Run 'scripts/sync-version.sh $VERSION' and commit before tagging."
            exit 1
          fi

  create-release:
    needs: validate-tag
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Create GitHub Release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: Release ${{ needs.validate-tag.outputs.tag }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-release:
    needs: [validate-tag, create-release]
    runs-on: ubuntu-latest
    environment: Vars
    strategy:
      fail-fast: false
      matrix:
        artifact-type: [aab, apk]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.validate-tag.outputs.tag }}

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android'

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init

      - name: Configure Android signing
        uses: ./.github/actions/configure-android-signing
        with:
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android AAB (Play Store)
        if: matrix.artifact-type == 'aab'
        run: npx tauri android build --aab
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Build Android APK (Direct Install)
        if: matrix.artifact-type == 'apk'
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Prepare release artifacts
        run: |
          VERSION="${{ needs.validate-tag.outputs.tag }}"
          mkdir -p release-artifacts

          if [ "${{ matrix.artifact-type }}" = "aab" ]; then
            cp src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab "release-artifacts/ka-cityrail-navigator-${VERSION}.aab"
          else
            cp src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk "release-artifacts/ka-cityrail-navigator-${VERSION}.apk"
          fi

          sha256sum release-artifacts/* > "release-artifacts/${{ matrix.artifact-type }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ needs.validate-tag.outputs.tag }}-${{ matrix.artifact-type }}
          path: release-artifacts/*
          retention-days: 90

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/keystore.jks src-tauri/gen/android/keystore.properties

  publish-release-assets:
    needs: [validate-tag, build-release]
    runs-on: ubuntu-latest

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-${{ needs.validate-tag.outputs.tag }}-aab
          path: release-artifacts

      - name: Download APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-${{ needs.validate-tag.outputs.tag }}-apk
          path: release-artifacts

      - name: Create combined checksums
        run: |
          cd release-artifacts
          sha256sum *.aab *.apk > SHA256SUMS

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          files: |
            release-artifacts/*.aab
            release-artifacts/*.apk
            release-artifacts/*.sha256
            release-artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-playstore:
    needs: [validate-tag, build-release]
    runs-on: ubuntu-latest
    if: vars.AUTO_PUBLISH_PLAYSTORE == 'true'

    steps:
      - name: Download AAB
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-${{ needs.validate-tag.outputs.tag }}-aab
          path: ./

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.oliver.ka-cityrail-navigator
          releaseFiles: "*.aab"
          track: internal
          status: completed
