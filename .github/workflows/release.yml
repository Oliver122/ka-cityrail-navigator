name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      should-release: ${{ steps.bump.outputs.should_release }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Calculate version
        id: bump
        run: |
          git fetch --tags --force
          
          # Get latest stable tag
          LATEST=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]' --sort=-v:refname | grep -v '-' | head -1 || echo "v0.0.0")
          VERSION="${LATEST#v}"
          
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          # Determine bump type from commit/branch
          COMMIT_MSG=$(git log -1 --pretty=%B)
          BRANCH=$(git log -1 --pretty=%s | grep -oP '(?<=from [^/]+/)[\w/-]+' | head -1 || echo "")
          
          echo "Commit: $COMMIT_MSG"
          echo "Branch: $BRANCH"
          
          # Skip CI/CD only changes
          if [[ "$COMMIT_MSG" =~ ^\[cicd\] ]] || [[ "$BRANCH" =~ ^cicd/ ]]; then
            echo "CI/CD change - skipping release"
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "version=$LATEST" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Determine version bump
          if [[ "$BRANCH" =~ ^bc/ ]] || [[ "$BRANCH" =~ ^breaking/ ]] || [[ "$COMMIT_MSG" =~ \[breaking\] ]]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
            BUMP="major"
          elif [[ "$BRANCH" =~ ^feat/ ]] || [[ "$COMMIT_MSG" =~ \[feat\] ]]; then
            MINOR=$((MINOR + 1)); PATCH=0
            BUMP="minor"
          else
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi
          
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "should_release=true" >> $GITHUB_OUTPUT
          echo "Bump: $BUMP | $LATEST -> $NEW_VERSION"

      - name: Update version files
        if: steps.bump.outputs.should_release == 'true'
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          VERSION="${VERSION#v}"
          
          npm version $VERSION --no-git-tag-version
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" src-tauri/tauri.conf.json
          sed -i "0,/^version = /s/^version = \"[^\"]*\"/version = \"$VERSION\"/" src-tauri/Cargo.toml

      - name: Commit and tag
        if: steps.bump.outputs.should_release == 'true'
        run: |
          TAG="${{ steps.bump.outputs.version }}"
          git add package.json package-lock.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
          if ! git diff --cached --quiet; then
            git commit -m "chore: release ${TAG}"
          else
            echo "No version file changes to commit."
          fi
          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists locally."
          else
            git tag "${TAG}"
          fi
          git push
          git push origin "${TAG}"

      - name: Create GitHub Release
        if: steps.bump.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.bump.outputs.version }}
          name: ${{ steps.bump.outputs.version }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    needs: version
    if: needs.version.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    environment: Vars
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version.outputs.version }}

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init

      - name: Validate generated Android config
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          test -f "$MANIFEST"
          test -f "$APP_GRADLE"
          rg -q "android.permission.ACCESS_(COARSE|FINE)_LOCATION" "$MANIFEST"
          rg -q "versionCode|versionName" "$APP_GRADLE"

      - name: Setup Android signing
        uses: ./.github/actions/android-signing
        with:
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build AAB (Play Store)
        run: npx tauri android build --aab
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Build APK (Direct Install)
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Package artifacts
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          mkdir -p artifacts
          cp src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab artifacts/ka-cityrail-navigator-${VERSION}.aab
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk artifacts/ka-cityrail-navigator-${VERSION}.apk

      - name: Upload to release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ needs.version.outputs.version }}
          files: artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ needs.version.outputs.version }}
          path: artifacts/*
          retention-days: 90

      - name: Cleanup
        if: always()
        run: rm -f $RUNNER_TEMP/keystore.jks src-tauri/gen/android/keystore.properties

  publish:
    needs: [version, build]
    if: needs.version.outputs.should-release == 'true' && vars.AUTO_PUBLISH_PLAYSTORE == 'true'
    runs-on: ubuntu-latest
    
    steps:
      - name: Download AAB
        uses: actions/download-artifact@v4
        with:
          name: release-${{ needs.version.outputs.version }}
          path: ./

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.oliver.ka-cityrail-navigator
          releaseFiles: "*.aab"
          track: internal
          status: completed

