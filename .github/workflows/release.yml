name: Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.major }}.${{ steps.release.outputs.minor }}.${{ steps.release.outputs.patch }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build-release:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: Vars
    strategy:
      fail-fast: false
      matrix:
        artifact-type: [aab, apk]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android'

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init

      - name: Configure Android signing
        uses: ./.github/actions/configure-android-signing
        with:
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android AAB (Play Store)
        if: matrix.artifact-type == 'aab'
        run: npx tauri android build --aab
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Build Android APK (Direct Install)
        if: matrix.artifact-type == 'apk'
        run: npx tauri android build --apk
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Prepare release artifacts
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          mkdir -p release-artifacts

          if [ "${{ matrix.artifact-type }}" = "aab" ]; then
            cp src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab "release-artifacts/ka-cityrail-navigator-${TAG}.aab"
          else
            cp src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk "release-artifacts/ka-cityrail-navigator-${TAG}.apk"
          fi

          sha256sum release-artifacts/* > "release-artifacts/${{ matrix.artifact-type }}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: release-${{ needs.release-please.outputs.tag_name }}-${{ matrix.artifact-type }}
          path: release-artifacts/*
          retention-days: 90

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/keystore.jks src-tauri/gen/android/keystore.properties

  publish-release-assets:
    needs: [release-please, build-release]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Download AAB artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-${{ needs.release-please.outputs.tag_name }}-aab
          path: release-artifacts

      - name: Download APK artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-${{ needs.release-please.outputs.tag_name }}-apk
          path: release-artifacts

      - name: Create combined checksums
        run: |
          cd release-artifacts
          sha256sum *.aab *.apk > SHA256SUMS

      - name: Upload artifacts to release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            release-artifacts/*.aab
            release-artifacts/*.apk
            release-artifacts/*.sha256
            release-artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  upload-playstore:
    needs: [release-please, build-release]
    runs-on: ubuntu-latest
    if: needs.release-please.outputs.release_created == 'true' && vars.AUTO_PUBLISH_PLAYSTORE == 'true'

    steps:
      - name: Download AAB
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: release-${{ needs.release-please.outputs.tag_name }}-aab
          path: ./

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@935ef9c68bb393a8e6116b1575626a7f5be3a7fb
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_STORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.oliver.ka-cityrail-navigator
          releaseFiles: "*.aab"
          track: internal
          status: completed
