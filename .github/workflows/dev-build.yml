name: Dev Build

on:
  push:
    branches: [development]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    environment: Vars
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version
        id: version
        run: |
          git fetch --tags --force
          
          # Get the latest stable release tag
          LATEST_STABLE=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]' --sort=-v:refname | grep -v '-' | head -1 || echo "v0.0.0")
          echo "Latest stable: $LATEST_STABLE"
          
          # Parse version components
          VERSION="${LATEST_STABLE#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          
          # Determine bump type from commit message (supports [feat], [fix], [cicd])
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          # Check for feat/fix prefix in commit message
          if [[ "$COMMIT_MSG" =~ ^\[feat\] ]] || [[ "$COMMIT_MSG" =~ ^feat: ]]; then
            MINOR=$((MINOR + 1))
            PATCH=0
            BUMP="minor"
          elif [[ "$COMMIT_MSG" =~ ^\[fix\] ]] || [[ "$COMMIT_MSG" =~ ^fix: ]]; then
            PATCH=$((PATCH + 1))
            BUMP="patch"
          elif [[ "$COMMIT_MSG" =~ ^\[cicd\] ]] || [[ "$COMMIT_MSG" =~ ^cicd: ]]; then
            echo "CI/CD change - still building but no version bump"
            PATCH=$((PATCH + 1))
            BUMP="patch"
          else
            # Default to patch bump
            PATCH=$((PATCH + 1))
            BUMP="patch"
          fi
          
          BASE_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          
          # Count existing dev builds for this base version
          DEV_COUNT=$(git tag -l "v${BASE_VERSION}-dev.*" | wc -l)
          DEV_NUM=$((DEV_COUNT + 1))
          
          FULL_VERSION="${BASE_VERSION}-dev.${DEV_NUM}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          echo "version=${FULL_VERSION}" >> $GITHUB_OUTPUT
          echo "base_version=${BASE_VERSION}" >> $GITHUB_OUTPUT
          echo "bump_type=${BUMP}" >> $GITHUB_OUTPUT
          echo "sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "Bump: ${BUMP} | Version: v${FULL_VERSION}"

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android'

      - name: Typecheck
        run: npm run typecheck

      - name: Android runtime smoke tests
        run: npm run test:android-smoke

      - name: Frontend unit tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init

      - name: Validate generated Android config
        run: |
          MANIFEST="src-tauri/gen/android/app/src/main/AndroidManifest.xml"
          APP_GRADLE="src-tauri/gen/android/app/build.gradle.kts"
          test -f "$MANIFEST"
          test -f "$APP_GRADLE"
          rg -q "android.permission.ACCESS_(COARSE|FINE)_LOCATION" "$MANIFEST"
          rg -q "versionCode|versionName" "$APP_GRADLE"

      - name: Setup Android signing
        uses: ./.github/actions/android-signing
        with:
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android APK (arm64)
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Package artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p artifacts
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk \
             artifacts/ka-cityrail-navigator-${VERSION}.apk

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ steps.version.outputs.version }}
          path: artifacts/*.apk
          retention-days: 30

      - name: Create dev release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          files: artifacts/*.apk
          prerelease: true
          generate_release_notes: false
          body: |
            **Development Build** (arm64 only)
            
            Type: `${{ steps.version.outputs.bump_type }}` bump
            Base version: `${{ steps.version.outputs.base_version }}`
            Commit: `${{ steps.version.outputs.sha }}`
            
            ✅ Signed APK - install directly
            ⚠️ Pre-release for testing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup
        if: always()
        run: rm -f $RUNNER_TEMP/keystore.jks src-tauri/gen/android/keystore.properties


