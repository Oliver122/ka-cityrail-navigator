name: Dev Build

on:
  push:
    branches: [development]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-dev:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          # Calculate next version (patch bump for pre_dev)
          VERSION="${LATEST_TAG#v}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Version: $NEXT_VERSION-pre_dev ($SHORT_SHA)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: cargo tauri android init

      - name: Build Android APK (arm64 only)
        run: cargo tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dev-artifacts
          cp src-tauri/gen/android/app/build/outputs/apk/arm64/release/*.apk dev-artifacts/ka-cityrail-navigator-${VERSION}-pre_dev.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ steps.version.outputs.version }}-pre_dev
          path: dev-artifacts/*.apk
          retention-days: 30

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre_dev
          name: Pre-release v${{ steps.version.outputs.version }}-pre_dev
          files: dev-artifacts/*.apk
          prerelease: true
          generate_release_notes: false
          body: |
            Development build from `development` branch (arm64 only, release mode).
            
            Commit: ${{ steps.version.outputs.sha }}
            
            ⚠️ This is a pre-release build for testing purposes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
