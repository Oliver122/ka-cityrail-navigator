name: Dev Build

on:
  push:
    branches: [development]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-dev:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version info
        id: version
        run: |
          git fetch --tags --force
          LATEST_TAG=$(git describe --tags --abbrev=0 origin/main 2>/dev/null || echo "v0.0.0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${LATEST_TAG#v}"
          VERSION="${VERSION%-pre_dev}"
          MAJOR=$(echo $VERSION | cut -d. -f1)
          MINOR=$(echo $VERSION | cut -d. -f2)
          PATCH=$(echo $VERSION | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG -> Next: $NEXT_VERSION-pre_dev ($SHORT_SHA)"

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android'

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init

      - name: Debug secrets
        run: |
          echo "KEY_ALIAS length: ${#ALIAS}"
          echo "KEY_PASSWORD length: ${#KEYPASS}"
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE}"
        env:
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEYPASS: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEYSTORE: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Configure Gradle for signing
        run: |
          cd src-tauri/gen/android/app
          
          # Add FileInputStream import only if not present (Properties is already there)
          if ! grep -q "import java.io.FileInputStream" build.gradle.kts; then
            sed -i '/^import java.util.Properties/a import java.io.FileInputStream' build.gradle.kts
          fi
          
          # Create signing config block
          cat > /tmp/signing_config.txt << 'SIGNING_EOF'
          
              signingConfigs {
                  create("release") {
                      val keystorePropertiesFile = rootProject.file("keystore.properties")
                      val keystoreProperties = Properties()
                      if (keystorePropertiesFile.exists()) {
                          keystoreProperties.load(FileInputStream(keystorePropertiesFile))
                      }
                      keyAlias = keystoreProperties["keyAlias"] as String
                      keyPassword = keystoreProperties["password"] as String
                      storeFile = file(keystoreProperties["storeFile"] as String)
                      storePassword = keystoreProperties["password"] as String
                  }
              }
          SIGNING_EOF
          
          # Insert signing config before buildTypes and add signingConfig to release
          awk '
            /^[[:space:]]*buildTypes[[:space:]]*\{/ {
              while ((getline line < "/tmp/signing_config.txt") > 0) print line
              close("/tmp/signing_config.txt")
            }
            { print }
            /getByName\("release"\)[[:space:]]*\{/ {
              print "            signingConfig = signingConfigs.getByName(\"release\")"
            }
          ' build.gradle.kts > build.gradle.kts.new
          mv build.gradle.kts.new build.gradle.kts

      - name: Build Android APK (arm64 only, signed)
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Rename artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dev-artifacts
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk dev-artifacts/ka-cityrail-navigator-${VERSION}-pre_dev.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: dev-build-${{ steps.version.outputs.version }}-pre_dev
          path: dev-artifacts/*.apk
          retention-days: 30

      - name: Create or update pre-release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}-pre_dev
          name: Pre-release v${{ steps.version.outputs.version }}-pre_dev
          files: dev-artifacts/*.apk
          prerelease: true
          generate_release_notes: false
          body: |
            Development build from `development` branch (arm64 only, signed).
            
            Commit: ${{ steps.version.outputs.sha }}
            
            ✅ APK is signed - can be installed directly without Play Store.
            ⚠️ This is a pre-release build for testing purposes.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/keystore.jks src-tauri/gen/android/keystore.properties
