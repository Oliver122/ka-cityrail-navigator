name: Dev Build

on:
  push:
    branches: [development]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: dev-build-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: development
          config-file: release-please-config-dev.json
          manifest-file: .release-please-manifest.json

  build-dev:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    environment: Vars

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: 'aarch64-linux-android'

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npx tauri android init

      - name: Configure Android signing
        uses: ./.github/actions/configure-android-signing
        with:
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Android APK (arm64 only, signed)
        run: npx tauri android build --apk --target aarch64
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}

      - name: Prepare artifacts
        run: |
          TAG="${{ needs.release-please.outputs.tag_name }}"
          mkdir -p dev-artifacts
          cp src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk "dev-artifacts/ka-cityrail-navigator-${TAG}.apk"
          sha256sum dev-artifacts/*.apk > dev-artifacts/SHA256SUMS

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: dev-build-${{ needs.release-please.outputs.tag_name }}
          path: dev-artifacts/*
          retention-days: 30

      - name: Upload to pre-release
        uses: softprops/action-gh-release@de2c0eb89ae2a093876385947365aca7b0e5f844
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name }}
          files: |
            dev-artifacts/*.apk
            dev-artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup keystore
        if: always()
        run: rm -f $RUNNER_TEMP/keystore.jks src-tauri/gen/android/keystore.properties
