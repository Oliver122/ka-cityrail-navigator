name: Build Android (Reusable)

on:
  workflow_call:
    inputs:
      build-type:
        description: 'Build type (debug or release)'
        required: false
        type: string
        default: 'release'
      output-format:
        description: 'Output format (apk, aab, or both)'
        required: false
        type: string
        default: 'both'
      rust-targets:
        description: 'Rust targets to build for (comma-separated)'
        required: false
        type: string
        default: 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android'
      artifact-name:
        description: 'Name for uploaded artifacts'
        required: true
        type: string
      artifact-retention-days:
        description: 'Days to retain artifacts'
        required: false
        type: number
        default: 30
    secrets:
      ANDROID_KEYSTORE_BASE64:
        required: false
      ANDROID_KEYSTORE_PASSWORD:
        required: false
      ANDROID_KEY_ALIAS:
        required: false
      ANDROID_KEY_PASSWORD:
        required: false
    outputs:
      artifact-name:
        description: 'Name of the uploaded artifact'
        value: ${{ jobs.build.outputs.artifact-name }}

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ inputs.artifact-name }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup build environment
        uses: ./.github/actions/setup-environment
        id: setup-env
        with:
          rust-targets: ${{ inputs.rust-targets }}

      - name: Setup Tauri CLI
        uses: ./.github/actions/setup-tauri

      - name: Build frontend
        run: npm run build

      - name: Initialize Android project
        run: npm run tauri android init

      - name: Decode keystore (release only)
        if: inputs.build-type == 'release' && secrets.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.keystore

      - name: Build Android APK
        if: inputs.output-format == 'apk' || inputs.output-format == 'both'
        run: |
          if [ "${{ inputs.build-type }}" = "debug" ]; then
            npm run tauri android build -- --apk --debug
          else
            npm run tauri android build -- --apk
          fi
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}
          TAURI_SIGNING_STORE_PATH: ${{ github.workspace }}/src-tauri/gen/android/release.keystore
          TAURI_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Build Android AAB
        if: inputs.output-format == 'aab' || inputs.output-format == 'both'
        run: |
          if [ "${{ inputs.build-type }}" = "debug" ]; then
            npm run tauri android build -- --aab --debug
          else
            npm run tauri android build -- --aab
          fi
        env:
          NDK_HOME: ${{ steps.setup-env.outputs.ndk-path }}
          TAURI_SIGNING_STORE_PATH: ${{ github.workspace }}/src-tauri/gen/android/release.keystore
          TAURI_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          BUILD_DIR="src-tauri/gen/android/app/build/outputs"
          
          if [ "${{ inputs.build-type }}" = "debug" ]; then
            [ -d "$BUILD_DIR/apk/universal/debug" ] && cp $BUILD_DIR/apk/universal/debug/*.apk artifacts/ || true
            [ -d "$BUILD_DIR/bundle/universalDebug" ] && cp $BUILD_DIR/bundle/universalDebug/*.aab artifacts/ || true
          else
            [ -d "$BUILD_DIR/apk/universal/release" ] && cp $BUILD_DIR/apk/universal/release/*.apk artifacts/ || true
            [ -d "$BUILD_DIR/bundle/universalRelease" ] && cp $BUILD_DIR/bundle/universalRelease/*.aab artifacts/ || true
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact-name }}
          path: artifacts/*
          retention-days: ${{ inputs.artifact-retention-days }}
          if-no-files-found: error

      - name: Cleanup keystore
        if: always()
        run: rm -f src-tauri/gen/android/release.keystore
