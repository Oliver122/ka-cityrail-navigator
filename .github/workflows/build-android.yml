name: Build Android

on:
  push:
    branches: [development, main]
  pull_request:
    branches: [development, main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-action@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26b
          add-to-path: true

      - name: Install dependencies
        run: npm ci

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0.0"

      - name: Build frontend
        run: npm run build

      # PR build (validation only - debug signed)
      - name: Build Android APK (PR Validation)
        if: github.event_name == 'pull_request'
        run: |
          cargo tauri android build --apk
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      # Development build (debug signed)
      - name: Build Android APK (Development)
        if: github.ref == 'refs/heads/development' && github.event_name == 'push'
        run: |
          cargo tauri android build --apk
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload Development APK
        if: github.ref == 'refs/heads/development' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-dev-debug
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          retention-days: 14

      # Production build (release signed for Play Store)
      - name: Decode Keystore
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/gen/android/release.keystore

      - name: Build Android AAB (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cargo tauri android build --aab
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TAURI_SIGNING_STORE_PATH: ${{ github.workspace }}/src-tauri/gen/android/release.keystore
          TAURI_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Production AAB
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: src-tauri/gen/android/app/build/outputs/bundle/universalRelease/*.aab
          retention-days: 30

      # Also build signed APK for direct distribution
      - name: Build Android APK (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          cargo tauri android build --apk
        env:
          NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}
          TAURI_SIGNING_STORE_PATH: ${{ github.workspace }}/src-tauri/gen/android/release.keystore
          TAURI_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          TAURI_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          TAURI_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Production APK
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
          retention-days: 30

      - name: Cleanup keystore
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: rm -f src-tauri/gen/android/release.keystore
